name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    env:
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  windows:
    name: Windows (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    env:
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~\.cache\huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install ffmpeg (chocolatey)
        run: choco install -y ffmpeg
        shell: pwsh

      - name: Install AutoHotkey v2 (GitHub release)
        shell: pwsh
        run: |
          # Chocolatey's "autohotkey" package is v1; v2 isn't there.
          # autohotkey.com Cloudflare-blocks GH Actions runner IPs, so pull
          # the v2 zip from the official AutoHotkey/AutoHotkey GitHub release.
          $autoHotkeyV2Version = "2.0.18"
          $downloadUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$autoHotkeyV2Version/AutoHotkey_$autoHotkeyV2Version.zip"
          $downloadZipPath = "$env:RUNNER_TEMP\ahk-v2.zip"
          $extractDirectory = "C:\AutoHotkeyV2"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $downloadZipPath -UseBasicParsing
          Expand-Archive -Path $downloadZipPath -DestinationPath $extractDirectory -Force
          Get-ChildItem $extractDirectory | Format-Table Name, Length

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      - name: Run pytest
        run: pytest tests/ -v
        shell: pwsh

      - name: Validate AutoHotkey script syntax
        shell: pwsh
        run: |
          $candidatePaths = @(
            "C:\AutoHotkeyV2\AutoHotkey64.exe",
            "C:\AutoHotkeyV2\AutoHotkey32.exe"
          )
          $autoHotkeyExecutablePath = $null
          foreach ($candidate in $candidatePaths) {
            if (Test-Path $candidate) { $autoHotkeyExecutablePath = $candidate; break }
          }
          if (-not $autoHotkeyExecutablePath) {
            $found = Get-ChildItem -Path "C:\AutoHotkeyV2" -Recurse -Filter "AutoHotkey*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $autoHotkeyExecutablePath = $found.FullName }
          }
          if (-not $autoHotkeyExecutablePath) {
            Write-Error "AutoHotkey executable not found in C:\AutoHotkeyV2"
            exit 1
          }
          Write-Host "Using AutoHotkey at: $autoHotkeyExecutablePath"
          $ahkProcess = Start-Process -FilePath $autoHotkeyExecutablePath `
            -ArgumentList "/validate","windows\streaming_dictation.ahk" `
            -Wait -PassThru -NoNewWindow
          $validationExitCode = $ahkProcess.ExitCode
          Write-Host "AutoHotkey /validate exit code: $validationExitCode"
          if ($validationExitCode -ne 0) {
            Write-Error "AutoHotkey script validation failed (exit $validationExitCode)"
            exit $validationExitCode
          }
